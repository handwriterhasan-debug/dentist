<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pearl Dental — Signature Oral Specialists</title>
    <script>
      (function() {
        try {
          var targetObj = typeof globalThis !== 'undefined' ? globalThis : window;
          if (targetObj) {
            var originalFetch = targetObj.fetch;
            var currentFetch = originalFetch;
            Object.defineProperty(targetObj, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Could not define safe global fetch wrapper:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
